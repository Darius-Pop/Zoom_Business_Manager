{% extends 'base.html' %}
{% block title %}Șterge Document — Zoom Design{% endblock %}
{% block nav_documente %}active{% endblock %}

{% block content %}
<div style="max-width:500px; margin:60px auto; text-align:center;">
  <div style="width:72px;height:72px;border-radius:50%;background:rgba(192,57,43,0.15);border:2px solid rgba(192,57,43,0.4);display:flex;align-items:center;justify-content:center;font-size:28px;color:#e87d72;margin:0 auto 24px;">
    <i class="fa-solid fa-trash"></i>
  </div>
  <h2 style="font-family:'Rajdhani',sans-serif;font-size:28px;font-weight:700;color:var(--white);text-transform:uppercase;margin-bottom:12px;">
    Confirmare ștergere
  </h2>
  <p style="color:var(--slate-400);font-size:15px;margin-bottom:8px;">
    Ești sigur că vrei să ștergi
  </p>
  <p style="color:var(--white);font-size:17px;font-weight:700;margin-bottom:32px;">
    „{{ object }}"?
  </p>
  <p style="color:#e87d72;font-size:13px;margin-bottom:32px;">
    <i class="fa-solid fa-triangle-exclamation"></i> Această acțiune este ireversibilă!
  </p>
  <div style="display:flex;gap:12px;justify-content:center;">
    <form method="POST">
      {% csrf_token %}
      <button type="submit" class="btn" style="background:rgba(192,57,43,0.2);border-color:rgba(192,57,43,0.5);color:#e87d72;padding:10px 28px;">
        <i class="fa-solid fa-trash"></i> Da, șterge
      </button>
    </form>
    <a href="{% url 'documente' %}" class="btn btn-outline" style="padding:10px 28px;">
      <i class="fa-solid fa-xmark"></i> Anulează
    </a>
  </div>
</div>
{% endblock %}
