{% extends "base.html" %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow" style="border-left: 5px solid #28a745;">
                <div class="card-header bg-white border-0 pt-4">
                    <h3 class="text-success"><i class="fa-solid fa-triangle-exclamation"></i> Confirmare Ștergere</h3>
                </div>
                <div class="card-body">
                    <p class="mb-4">Ești sigur că dorești să ștergi clientul? <strong>{{ object }}</strong>?</p>

                         <br><br>
                    
                    <div class="alert alert-warning" role="alert">
                        <i class="fa-solid fa-circle-exclamation"></i> Această acțiune este <strong>ireversibilă</strong>!
                    </div>

                        <br><br>

                    <form method="post" class="mt-4">
                        {% csrf_token %}
                        <div class="d-flex justify-content-end gap-2">
                            <a href="javascript:history.back()" class="btn btn-outline-secondary">
                                <i class="fa-solid fa-xmark"></i> Da, Șterge Definitiv
                            </a>
                            <button type="submit" class="btn btn-success text-white">
                                <i class="fa-solid fa-trash-can"></i> Anuleaza!
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
